name: Build Flutter APK/AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Build APK release
        run: flutter build apk --release --build-name=1.0.0 --build-number=1

      - name: Build AAB release
        run: flutter build appbundle --release --build-name=1.0.0 --build-number=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bazikhone-native-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: bazikhone-native-aab
          path: build/app/outputs/bundle/release/app-release.aab
