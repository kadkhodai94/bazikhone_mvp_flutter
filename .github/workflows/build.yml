name: Build Flutter From ZIP

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          ZIP_FILE=$(ls *.zip | head -n 1)
          echo "Found ZIP: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted
          ls -la extracted
          if [ -d extracted/* ]; then
            cp -r extracted/*/* .
          else
            cp -r extracted/* .
          fi
          ls -la

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Create Android scaffold and restore real app
        run: |
          test -f app_src/main.dart
          test -f pubspec.yaml
          cp app_src/main.dart /tmp/bazikhone_main.dart
          cp pubspec.yaml /tmp/bazikhone_pubspec.yaml
          flutter create --platforms=android --org mk.kadkhodai.bazikhone .
          mkdir -p lib
          cp /tmp/bazikhone_main.dart lib/main.dart
          cp /tmp/bazikhone_pubspec.yaml pubspec.yaml

      - name: Get packages
        run: flutter pub get

      - name: Verify no Flutter demo
        run: python3 scripts/verify_no_demo.py

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bazikhone-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: bazikhone-aab
          path: build/app/outputs/bundle/release/app-release.aab
