name: Build BaziKhoneh Native Flutter APK AAB

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Create Android scaffold and restore real app
        run: |
          test -f app_src/main.dart
          test -f pubspec.yaml
          cp app_src/main.dart /tmp/bazikhone_main.dart
          cp pubspec.yaml /tmp/bazikhone_pubspec.yaml
          flutter create --platforms=android --org mk.kadkhodai.bazikhone .
          mkdir -p lib
          cp /tmp/bazikhone_main.dart lib/main.dart
          cp /tmp/bazikhone_pubspec.yaml pubspec.yaml

      - name: Get packages
        run: flutter pub get

      - name: Verify no Flutter demo / no WebView
        run: python3 scripts/verify_no_demo.py

      - name: Analyze
        run: flutter analyze || true

      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bazikhone-native-flutter-v5-no-demo-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: bazikhone-native-flutter-v5-no-demo-aab
          path: build/app/outputs/bundle/release/app-release.aab
