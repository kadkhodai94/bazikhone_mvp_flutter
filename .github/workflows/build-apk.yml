name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Find Flutter project
        run: |
          echo "Searching for pubspec.yaml..."
          PROJECT_DIR=$(dirname "$(find . -name pubspec.yaml -not -path "*/.dart_tool/*" | head -n 1)")

          if [ -z "$PROJECT_DIR" ] || [ "$PROJECT_DIR" = "." ]; then
            if [ -f "pubspec.yaml" ]; then
              PROJECT_DIR="."
            else
              echo "No Flutter project found. pubspec.yaml is missing."
              exit 1
            fi
          fi

          echo "Flutter project found at: $PROJECT_DIR"
          echo "FLUTTER_PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Flutter pub get
        run: |
          cd "$FLUTTER_PROJECT_DIR"
          flutter pub get

      - name: Build release APK
        run: |
          cd "$FLUTTER_PROJECT_DIR"
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: multi-games-release-apk
          path: ${{ env.FLUTTER_PROJECT_DIR }}/build/app/outputs/flutter-apk/app-release.apk
