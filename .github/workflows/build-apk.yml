name: Build Flutter APK from ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get repository files
        uses: actions/checkout@v4

      - name: Show files
        run: |
          echo "Repository files:"
          ls -la

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Find and unzip Flutter project
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            echo "Please upload your Flutter project ZIP file."
            exit 1
          fi

          echo "Using ZIP file: $ZIP_FILE"

          rm -rf extracted
          mkdir extracted

          unzip -q "$ZIP_FILE" -d extracted

          SRC_DIR=$(find extracted -name pubspec.yaml -exec dirname {} \; | head -n 1)

          if [ -z "$SRC_DIR" ]; then
            echo "pubspec.yaml not found inside ZIP."
            echo "Make sure the ZIP contains a Flutter project."
            exit 1
          fi

          echo "SRC_DIR=$SRC_DIR" >> $GITHUB_ENV
          echo "Source Flutter project found at: $SRC_DIR"

      - name: Create clean Flutter project
        run: |
          rm -rf bazikhone_build
          flutter create -t app --platforms=android bazikhone_build

      - name: Copy app source into clean Flutter project
        run: |
          rsync -av "$SRC_DIR"/ bazikhone_build/ \
            --exclude android \
            --exclude ios \
            --exclude web \
            --exclude linux \
            --exclude macos \
            --exclude windows \
            --exclude build \
            --exclude .dart_tool \
            --exclude .idea \
            --exclude .vscode

      - name: Install dependencies
        run: |
          cd bazikhone_build
          flutter pub get

      - name: Analyze project
        run: |
          cd bazikhone_build
          flutter analyze || true

      - name: Build release APK
        run: |
          cd bazikhone_build
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bazikhone-apk
          path: bazikhone_build/build/app/outputs/flutter-apk/app-release.apk
