name: Build Installable Flutter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Extract project zip if needed
        run: |
          mkdir -p extracted_projects

          ZIP_COUNT=$(find . -maxdepth 3 -type f -name "*.zip" | wc -l)
          echo "ZIP files found: $ZIP_COUNT"

          if [ "$ZIP_COUNT" -gt 0 ]; then
            find . -maxdepth 3 -type f -name "*.zip" | while read ZIPFILE; do
              BASENAME=$(basename "$ZIPFILE" .zip)
              echo "Extracting: $ZIPFILE"
              unzip -o "$ZIPFILE" -d "extracted_projects/$BASENAME"
            done
          fi

      - name: Find Flutter project
        run: |
          PUBSPEC=$(find . -name pubspec.yaml -not -path "*/.dart_tool/*" | head -n 1)

          if [ -z "$PUBSPEC" ]; then
            echo "No Flutter project found. pubspec.yaml is missing."
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PUBSPEC")
          echo "Flutter project found at: $PROJECT_DIR"
          echo "FLUTTER_PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Fix Android config
        run: |
          cd "$FLUTTER_PROJECT_DIR"

          mkdir -p android/app/src/main/kotlin/com/lalenawid/multigames
          mkdir -p android/app/src/main/res/values

          cat > android/app/src/main/kotlin/com/lalenawid/multigames/MainActivity.kt <<'EOF'
          package com.lalenawid.multigames

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity()
          EOF

          cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>

              <application
                  android:label="مجموعه بازی‌ها"
                  android:name="${applicationName}"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true"
                  android:theme="@style/LaunchTheme">

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:hardwareAccelerated="true"
                      android:launchMode="singleTop"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:windowSoftInputMode="adjustResize">

                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > android/app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">#F7EFE1</item>
                  <item name="android:forceDarkAllowed">false</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
              </style>

              <style name="NormalTheme" parent="@android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">#F7EFE1</item>
                  <item name="android:forceDarkAllowed">false</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
              </style>
          </resources>
          EOF

          cat > android/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.daemon=false
          org.gradle.parallel=false
          EOF

          sed -i 's/compileSdk [0-9][0-9]*/compileSdk 36/g' android/app/build.gradle || true
          sed -i 's/compileSdk = [0-9][0-9]*/compileSdk = 36/g' android/app/build.gradle || true
          sed -i 's/targetSdk [0-9][0-9]*/targetSdk 36/g' android/app/build.gradle || true
          sed -i 's/targetSdk = [0-9][0-9]*/targetSdk = 36/g' android/app/build.gradle || true

      - name: Flutter pub get
        run: |
          cd "$FLUTTER_PROJECT_DIR"
          flutter pub get

      - name: Build installable debug APK
        run: |
          cd "$FLUTTER_PROJECT_DIR"
          flutter build apk --debug --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: multi-games-installable-apk
          path: ${{ env.FLUTTER_PROJECT_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
