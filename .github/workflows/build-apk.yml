name: Build Flutter APK from ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get repository files
        uses: actions/checkout@v4

      - name: Show files
        run: |
          echo "Repository files:"
          ls -la

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Find and unzip Flutter project
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            exit 1
          fi
          echo "Using ZIP file: $ZIP_FILE"
          rm -rf extracted
          mkdir extracted
          unzip -q "$ZIP_FILE" -d extracted
          SRC_DIR=$(find extracted -name pubspec.yaml -exec dirname {} \; | head -n 1)
          if [ -z "$SRC_DIR" ]; then
            echo "pubspec.yaml not found inside ZIP."
            exit 1
          fi
          echo "SRC_DIR=$SRC_DIR" >> $GITHUB_ENV
          echo "Source Flutter project found at: $SRC_DIR"

      - name: Create clean Flutter project
        run: |
          rm -rf bazikhone_build
          flutter create -t app --platforms=android --org ir.kadkhodae bazikhone_build

      - name: Copy app source into clean project
        run: |
          rsync -av "$SRC_DIR"/ bazikhone_build/ \
            --exclude android \
            --exclude ios \
            --exclude web \
            --exclude linux \
            --exclude macos \
            --exclude windows \
            --exclude build \
            --exclude .dart_tool \
            --exclude .idea \
            --exclude .vscode

      - name: Apply package name, app icon and Persian label
        run: |
          cd bazikhone_build
          python3 - <<'PYPKG'
          from pathlib import Path
          import re, shutil

          APP_ID = 'ir.kadkhodae.bazikhoneh'
          APP_LABEL = 'بازی‌خونه'

          # Android manifest label
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text(encoding='utf-8')
          text = re.sub(r'android:label="[^"]+"', f'android:label="{APP_LABEL}"', text)
          text = re.sub(r'package="[^"]+"', f'package="{APP_ID}"', text)
          manifest.write_text(text, encoding='utf-8')

          # Gradle namespace and applicationId, compatible with Groovy and Kotlin DSL
          for gradle in [Path('android/app/build.gradle'), Path('android/app/build.gradle.kts')]:
              if not gradle.exists():
                  continue
              g = gradle.read_text(encoding='utf-8')
              g = re.sub(r'namespace\s*=\s*"[^"]+"', f'namespace = "{APP_ID}"', g)
              g = re.sub(r'applicationId\s*=\s*"[^"]+"', f'applicationId = "{APP_ID}"', g)
              g = re.sub(r'namespace\s+"[^"]+"', f'namespace "{APP_ID}"', g)
              g = re.sub(r'applicationId\s+"[^"]+"', f'applicationId "{APP_ID}"', g)
              gradle.write_text(g, encoding='utf-8')

          # MainActivity package path
          for base in [Path('android/app/src/main/kotlin'), Path('android/app/src/main/java')]:
              if not base.exists():
                  continue
              activities = list(base.rglob('MainActivity.*'))
              if not activities:
                  continue
              src = activities[0]
              code = src.read_text(encoding='utf-8')
              code = re.sub(r'^package\s+[^\n]+', f'package {APP_ID}', code, flags=re.MULTILINE)
              dest = base.joinpath(*APP_ID.split('.'), src.name)
              dest.parent.mkdir(parents=True, exist_ok=True)
              dest.write_text(code, encoding='utf-8')
              if src.resolve() != dest.resolve():
                  try:
                      src.unlink()
                  except FileNotFoundError:
                      pass

          # Launcher icon: use the provided app icon for all launcher densities.
          icon = Path('assets/images/app_icon.png')
          if icon.exists():
              for d in ['mipmap-mdpi', 'mipmap-hdpi', 'mipmap-xhdpi', 'mipmap-xxhdpi', 'mipmap-xxxhdpi']:
                  target_dir = Path('android/app/src/main/res') / d
                  target_dir.mkdir(parents=True, exist_ok=True)
                  shutil.copyfile(icon, target_dir / 'ic_launcher.png')
          PYPKG


      - name: Apply Adivery R8 release build fix
        run: |
          cd bazikhone_build
          mkdir -p android/app
          cat > android/app/proguard-rules.pro <<'EOF'
          # Adivery / mediation optional classes. They are referenced by adapters
          # but may not be bundled in every build flavor, so R8 must not fail on them.
          -dontwarn com.mbridge.**
          -dontwarn com.mintegral.**
          -dontwarn com.anythink.**
          -dontwarn com.ironsource.**
          -dontwarn com.unity3d.**
          -dontwarn com.chartboost.**
          -dontwarn com.applovin.**
          -dontwarn com.google.android.gms.ads.**
          -keep class com.adivery.** { *; }
          -keep class com.mbridge.** { *; }
          EOF
          python3 - <<'PYR8'
          from pathlib import Path
          import re

          def patch_kts(path: Path):
              text = path.read_text(encoding='utf-8')
              if 'proguard-rules.pro' not in text:
                  text = text.replace(
                      'signingConfig = signingConfigs.getByName("debug")',
                      'signingConfig = signingConfigs.getByName("debug")\n            isMinifyEnabled = false\n            isShrinkResources = false\n            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")'
                  )
              elif 'isMinifyEnabled = false' not in text:
                  text = text.replace('proguardFiles(', 'isMinifyEnabled = false\n            isShrinkResources = false\n            proguardFiles(')
              path.write_text(text, encoding='utf-8')

          def patch_groovy(path: Path):
              text = path.read_text(encoding='utf-8')
              if 'proguard-rules.pro' not in text:
                  text = text.replace(
                      'signingConfig signingConfigs.debug',
                      "signingConfig signingConfigs.debug\n            minifyEnabled false\n            shrinkResources false\n            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'"
                  )
              elif 'minifyEnabled false' not in text:
                  text = text.replace('proguardFiles ', 'minifyEnabled false\n            shrinkResources false\n            proguardFiles ')
              path.write_text(text, encoding='utf-8')

          for candidate in [Path('android/app/build.gradle.kts'), Path('android/app/build.gradle')]:
              if candidate.exists():
                  if candidate.suffix == '.kts':
                      patch_kts(candidate)
                  else:
                      patch_groovy(candidate)
          PYR8

      - name: Install dependencies
        run: |
          cd bazikhone_build
          flutter pub get

      - name: Build release APK
        run: |
          cd bazikhone_build
          flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bazikhone-apk
          path: bazikhone_build/build/app/outputs/flutter-apk/app-release.apk
