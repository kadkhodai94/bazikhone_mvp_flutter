name: Build Flutter APK from ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get repository files
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Unzip Flutter project
        run: |
          unzip -q bazikhone_mvp_flutter.zip -d extracted
          SRC_DIR=$(find extracted -name pubspec.yaml -exec dirname {} \; | head -n 1)
          echo "SRC_DIR=$SRC_DIR" >> $GITHUB_ENV
          echo "Source project found at: $SRC_DIR"

      - name: Create clean Flutter project
        run: |
          flutter create -t app --platforms=android bazikhone_build

      - name: Copy app source into clean project
        run: |
          rsync -av "$SRC_DIR"/ bazikhone_build/ \
            --exclude android \
            --exclude ios \
            --exclude web \
            --exclude linux \
            --exclude macos \
            --exclude windows \
            --exclude build \
            --exclude .dart_tool

      - name: Install dependencies
        run: |
          cd bazikhone_build
          flutter pub get

      - name: Build APK
        run: |
          cd bazikhone_build
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bazikhone-apk
          path: bazikhone_build/build/app/outputs/flutter-apk/app-release.apk
